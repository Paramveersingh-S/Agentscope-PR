version: "3.9"

services:
  # ── ChromaDB (Local Vector DB) ────────────────
  chromadb:
    image: chromadb/chroma:0.5.3
    ports: ["8000:8000"]
    volumes: [chroma_data:/chroma/chroma]
    environment:
      ANONYMIZED_TELEMETRY: "false"
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Backend API ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - CHROMADB_URL=http://chromadb:8000
    ports: ["8001:8001"]
    depends_on:
      - chromadb
    volumes: [./backend:/app]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Celery Worker ─────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - CHROMADB_URL=http://chromadb:8000
    depends_on:
      - backend
    volumes: [./backend:/app]
    # Running with concurrency=2 to save Codespace RAM
    command: celery -A app.workers.review_tasks.celery_app worker --loglevel=info --concurrency=2 -Q review_queue
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Next.js Frontend ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_WS_URL: ws://localhost:8001
    ports: ["3000:3000"]
    volumes: [./frontend/src:/app/src]
    depends_on: [backend]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  chroma_data:
