name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pr_sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+asyncpg://sentinel:password@localhost:5432/pr_sentinel_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test_secret_key
        GITHUB_APP_ID: 123
        GITHUB_APP_PRIVATE_KEY: dummy
        GITHUB_WEBHOOK_SECRET: dummy
      run: |
        pytest tests/
